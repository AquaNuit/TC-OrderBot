services:
  - type: worker
    name: discord-order-bot
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: python bot.py
    envVars:
      - key: DISCORD_TOKEN
        sync: false
      - key: GUILD_ID
        sync: false
      - key: PANEL_CHANNEL_ID
        sync: false
      - key: TICKET_CATEGORY_ID
        sync: false
      - key: STAFF_ROLE_IDS
        sync: false
      - key: PYTHON_VERSION
        value: 3.13.0
